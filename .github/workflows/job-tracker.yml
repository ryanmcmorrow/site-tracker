name: Job Tracker

on:
  schedule:
    - cron: '57 11,21 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch ATS roles
        run: python fetch_jobs.py
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

      - name: Commit results
        run: |
          git config user.email "mcmorrowr@gmail.com"
          git config user.name "Ryan McMorrow"
          git add seen_jobs.json
          git diff --staged --quiet || git commit -m "job-tracker fetch $(date +%Y-%m-%d)"
          git push

